<!DOCTYPE html>
<html>
<head>
    <title>Cena w zależności od marki</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Cena w zależności od marki</h1>
    <p>Wykres przedstawia średnią cenę samochodów w zależności od marki.</p>

    <canvas id="myChart"></canvas>

    <script>
        // Dane dla wykresu
        const data = {
            labels: ['Audi', 'BMW', 'Mercedes'],
            datasets: [{
                label: 'Średnia cena',
                data: [50000, 60000, 70000],
                backgroundColor: ['red', 'blue', 'green']
            }]
        };

        // Konfiguracja wykresu
        const config = {
            type: 'bar',
            data: data,
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        };

        // Utworzenie wykresu
        const myChart = new Chart(
            document.getElementById('myChart'),
            config
        );
    </script>
</body>
</html>
